<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="15.5" fill="#00B4D8"/>
  <!-- Inner purple -->
  <circle cx="16" cy="16" r="14" fill="#2D1B8F"/>
  <!-- Simplified rupee/currency: two horizontal bars (orange) + vertical stroke (green) -->
  <rect x="7" y="9" width="18" height="2.8" rx="1.4" fill="#F97316"/>
  <rect x="7" y="13" width="15" height="2.8" rx="1.4" fill="#F5A623"/>
  <!-- Vertical curved stroke -->
  <path d="M12,11.5 Q11,18 12.5,24 Q14,27 16,27.5 Q18,27 19.5,24 Q21,18 20,11.5"
        fill="none" stroke="#22C55E" stroke-width="3.5" stroke-linecap="round"/>
  <!-- B letter at top for readability -->
  <text x="16" y="9.5" text-anchor="middle" font-family="Arial Black,Arial,sans-serif"
        font-size="5.5" font-weight="900" fill="white" letter-spacing="0.5">BH</text>
</svg>
