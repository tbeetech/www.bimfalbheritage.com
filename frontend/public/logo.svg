<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="98" fill="#00B4D8"/>
  <!-- Inner purple background -->
  <circle cx="100" cy="100" r="90" fill="#2D1B8F"/>
  <!-- Orange sun left -->
  <g transform="translate(24,76)">
    <circle cx="0" cy="0" r="8" fill="#F97316"/>
    <g stroke="#F97316" stroke-width="2">
      <line x1="0" y1="-12" x2="0" y2="-10"/>
      <line x1="0" y1="10" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-10" y2="0"/>
      <line x1="10" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="-7" y2="-7"/>
      <line x1="7" y1="7" x2="8.5" y2="8.5"/>
      <line x1="8.5" y1="-8.5" x2="7" y2="-7"/>
      <line x1="-7" y1="7" x2="-8.5" y2="8.5"/>
    </g>
  </g>
  <!-- Orange sun right -->
  <g transform="translate(176,76)">
    <circle cx="0" cy="0" r="8" fill="#F97316"/>
    <g stroke="#F97316" stroke-width="2">
      <line x1="0" y1="-12" x2="0" y2="-10"/>
      <line x1="0" y1="10" x2="0" y2="12"/>
      <line x1="-12" y1="0" x2="-10" y2="0"/>
      <line x1="10" y1="0" x2="12" y2="0"/>
      <line x1="-8.5" y1="-8.5" x2="-7" y2="-7"/>
      <line x1="7" y1="7" x2="8.5" y2="8.5"/>
      <line x1="8.5" y1="-8.5" x2="7" y2="-7"/>
      <line x1="-7" y1="7" x2="-8.5" y2="8.5"/>
    </g>
  </g>
  <!-- Currency/Rupee symbol: horizontal bars (orange) + vertical stroke (green) -->
  <!-- Two horizontal bars -->
  <rect x="64" y="68" width="72" height="11" rx="5" fill="#F97316"/>
  <rect x="64" y="84" width="60" height="11" rx="5" fill="#F5A623"/>
  <!-- Vertical curved stroke (green-to-dark-green) -->
  <path d="M84,78 Q78,110 86,138 Q92,152 100,155 Q108,152 114,138 Q122,110 116,78"
        fill="none" stroke="url(#greenGrad)" stroke-width="14" stroke-linecap="round"/>
  <defs>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>
  <!-- BIMFALB text arc (top) -->
  <path id="topArc" d="M 24,100 A 76,76 0 0,1 176,100" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-size="19" font-weight="900" fill="white" letter-spacing="3">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">BIMFALB</textPath>
  </text>
  <!-- TIWA N TIWA text arc (bottom) -->
  <path id="botArc" d="M 22,106 A 78,78 0 0,0 178,106" fill="none"/>
  <text font-family="Arial Black, Arial, sans-serif" font-size="14" font-weight="900" fill="white" letter-spacing="2">
    <textPath href="#botArc" startOffset="50%" text-anchor="middle">TIWA N TIWA</textPath>
  </text>
</svg>
