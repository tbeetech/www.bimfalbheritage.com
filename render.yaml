# Render.com deployment configuration for Bimfalb Heritage.
# Express serves both the API (/api/*) and the built React SPA.
#
# Required secrets – set these in the Render dashboard (Environment → Secret Files
# or Environment Variables) before deploying:
#   MONGODB_URI     – MongoDB Atlas connection string
#   JWT_SECRET      – Secret for signing JWTs (min 32 chars recommended)
#   ADMIN_PASSWORD  – Password for the admin panel login

services:
  - type: web
    name: bimfalb-heritage
    runtime: node
    # Install backend deps + build the React frontend into dist/
    buildCommand: "npm install --prefix backend && npm ci --prefix frontend && npm run build --prefix frontend"
    # Start the Express API server (SERVE_FRONTEND=true makes it also serve dist/)
    startCommand: "node backend/src/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_FRONTEND
        value: "true"
      # The following secrets must be configured in the Render dashboard:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
